<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>编辑器</title>
  <style>
    :root { --bg:#f4f5f7; --panel:#fff; --text:#17181c; --muted:#6d7380; --line:#d9dde3; --accent:#2457ff; }
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text)}
    header{padding:24px 20px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#fff 0%,#f8f9fb 100%)} .wrap{max-width:980px;margin:0 auto}
    a{color:var(--accent);text-decoration:none} h1{margin:0;font-size:28px} .sub{margin-top:8px;color:var(--muted);font-size:14px}
    main{padding:20px}.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;overflow:hidden}
    .head{padding:14px 14px 10px;border-bottom:1px solid var(--line)} .meta{margin-top:6px;color:var(--muted);font-size:13px}
    video{display:block;width:100%;aspect-ratio:16/9;background:#000}.note{padding:10px 14px 14px;color:var(--muted);font-size:13px}
    footer{padding:16px 20px 32px;color:var(--muted);font-size:12px;text-align:center}
  </style>
</head>
<body>
  <header><div class="wrap"><h1>编辑器</h1><div class="sub"><a href="index.html">返回目录</a></div></div></header>
  <main class="wrap">
    <section class="card">
      <div class="head">
        <div class="meta">工具 / 交互</div>
      </div>
      <video controls preload="metadata" playsinline src="assets/videos/编辑器/编辑器.mp4"></video>
      <div class="note">可直接在线播放，也可右键下载保存本地。</div>
    </section>
  </main>
  <footer>作品集视频页</footer>
</body>
</html>
