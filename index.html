<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>作品集视频目录</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --muted: #666666;
      --line: #e6e6e6;
      --link: #1f5eff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }
    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      line-height: 1.2;
    }
    .sub {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }
    .section {
      margin-top: 28px;
    }
    .section h2 {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 600;
      color: #222;
    }
    .list {
      border-top: 1px solid var(--line);
    }
    a.item {
      display: block;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
      text-decoration: none;
      color: var(--text);
    }
    a.item:hover .name {
      color: var(--link);
    }
    .name {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.35;
    }
    .desc {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    footer {
      margin-top: 28px;
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>作品集视频目录</h1>
    <div class="sub">点击进入对应项目页面。Shader 相关放在一起，其余项目单独页面。</div>

    <section class="section">
      <h2>项目页面</h2>
      <div class="list">
        <a class="item" href="mmo.html">
          <div class="name">MMO 项目</div>
          <div class="desc">核心项目演示页</div>
        </a>
        <a class="item" href="editor.html">
          <div class="name">编辑器</div>
          <div class="desc">单独视频页</div>
        </a>
        <a class="item" href="lua-hot-update.html">
          <div class="name">Lua 热更</div>
          <div class="desc">单独视频页</div>
        </a>
        <a class="item" href="2d-demo.html">
          <div class="name">横板 2D Demo</div>
          <div class="desc">单独视频页</div>
        </a>
        <a class="item" href="cat.html">
          <div class="name">小猫</div>
          <div class="desc">单独视频页</div>
        </a>
        <a class="item" href="shaders.html">
          <div class="name">Shader 相关合集</div>
          <div class="desc">边缘光、草地、海洋、玻璃、体积云、computerShader 草地</div>
        </a>
      </div>
    </section>

    <footer>作品集视频站点</footer>
  </main>
</body>
</html>
