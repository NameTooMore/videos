<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shader 目录</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --muted: #666666;
      --line: #e6e6e6;
      --link: #1f5eff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }
    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      font-weight: 700;
    }
    .sub {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }
    .section {
      margin-top: 28px;
    }
    .section h2 {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 600;
      color: #222;
    }
    .list {
      border-top: 1px solid var(--line);
    }
    a.item {
      display: block;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
      text-decoration: none;
      color: var(--text);
    }
    a.item:hover .name {
      color: var(--link);
    }
    .name {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.35;
    }
    .desc {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    footer {
      margin-top: 28px;
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Shader 目录</h1>
    <div class="sub">先选项目，再进入单独视频页。这样不会一次性加载全部 Shader 视频。</div>

    <section class="section">
      <h2>Shader 页面</h2>
      <div class="list">
        <a class="item" href="shader-edge-light.html">
          <div class="name">边缘光</div>
          <div class="desc">单独页面</div>
        </a>
        <a class="item" href="shader-grass.html">
          <div class="name">草地 Shader</div>
          <div class="desc">单独页面</div>
        </a>
        <a class="item" href="shader-ocean.html">
          <div class="name">海洋 Shader</div>
          <div class="desc">单独页面</div>
        </a>
        <a class="item" href="shader-glass-water.html">
          <div class="name">挂满水滴的玻璃</div>
          <div class="desc">单独页面</div>
        </a>
        <a class="item" href="shader-volumetric-cloud.html">
          <div class="name">体积云</div>
          <div class="desc">单独页面</div>
        </a>
        <a class="item" href="shader-cloud-shadow.html">
          <div class="name">云层阴影</div>
          <div class="desc">单独页面</div>
        </a>
        <a class="item" href="shader-dof.html">
          <div class="name">景深</div>
          <div class="desc">单独页面</div>
        </a>
        <a class="item" href="shader-birds.html">
          <div class="name">飞鸟</div>
          <div class="desc">单独页面</div>
        </a>
        <a class="item" href="shader-compute-grass.html">
          <div class="name">computerShader 草地</div>
          <div class="desc">单独页面</div>
        </a>
      </div>
    </section>

    <footer><a href="index.html">返回目录</a></footer>
  </main>
</body>
</html>
